services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-react-ts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: auth-react-ts-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${SERVER_PORT:-5007}
      DATABASE_URL: ${DATABASE_URL:-postgres://app_user:app_password@postgres:5432/app_db}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8010}
      # Optional fallback vars (also used by entrypoint if DATABASE_URL is not set)
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-app_db}
      DB_USER: ${POSTGRES_USER:-app_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
    # For debugging / direct access to API:
    ports:
      - "${SERVER_PORT:-5007}:5007"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: auth-react-ts-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-8010}:80"

volumes:
  postgres_data:
