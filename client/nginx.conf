server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Docker embedded DNS (avoid crash on upstream not-yet-ready)
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Backend upstream as variable (forces runtime DNS)
  set $backend_upstream "http://server:5007";

  # Basic security headers (minimal, safe defaults)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Static assets
  location /assets/ {
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # API proxy (matches Vite dev proxy behaviour: strip /api prefix)
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass $backend_upstream;
  }

  # SPA fallback (React Router)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
